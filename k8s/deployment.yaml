apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcg-notification-api-deployment
  labels:
    app: fcg-notification-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fcg-notification-api
  template:
    metadata:
      labels: 
        app: fcg-notification-api
      annotations:
        autor: Alex O Ferreira
        description: "Deployment do microsservico de Catalogo API do Fiap Cloud Games"
    spec:      
      containers:
      - name: c-fcg-notifications-api
        image: alexoliverdev/fcg-notification-api:latest
        ports:
        - containerPort: 8080
        env:
          - name: K8S_RABBITMQ_SERVER
            valueFrom:
              configMapKeyRef:
                name: notification-config
                key: RABBITMQ_SERVER
          - name: K8S_RABBITMQ_PORT
            valueFrom:
              configMapKeyRef:
                name: notification-config
                key: RABBITMQ_PORT
          - name: K8S_NOTIFICATION_USER_CREATED_QUEUE
            valueFrom:
              configMapKeyRef:
                name: catalog-config
                key: NOTIFICATION_USER_CREATED_QUEUE
          - name: K8S_NOTIFICATION_PAYMENT_FAILED_QUEUE
            valueFrom:
              configMapKeyRef:
                name: catalog-config
                key: NOTIFICATION_PAYMENT_FAILED_QUEUE
          - name: K8S_NOTIFICATION_PAYMENT_PROCESSED_QUEUE
            valueFrom:
              configMapKeyRef:
                name: notification-config
                key: NOTIFICATION_PAYMENT_PROCESSED_QUEUE
          - name: K8S_NOTIFICATION_DELIVERY_FAILED_QUEUE
            valueFrom:
              configMapKeyRef:
                name: notification-config
                key: NOTIFICATION_DELIVERY_FAILED_QUEUE
          - name: K8S_REDIS_SERVER
            valueFrom:
              configMapKeyRef:
                name: notification-config
                key: REDIS_SERVER
          - name: K8S_REDIS_PORT
            valueFrom:
              configMapKeyRef:
                name: notification-config
                key: REDIS_PORT
          - name: K8S_REDIS_NAME
            valueFrom:
              configMapKeyRef:
                name: notification-config
                key: REDIS_NAME
          - name: K8S_ENVIRONMENT
            valueFrom:
              configMapKeyRef:
                name: notification-config
                key: ENVIRONMENT
          - name: K8S_RABBITMQ_USER
            valueFrom:
              secretKeyRef:
                name: notification-opaque
                key: RABBITMQ_USER
          - name: K8S_RABBITMQ_PASSWORD
            valueFrom:
              secretKeyRef:
                name: notification-opaque
                key: RABBITMQ_PASS
          - name: K8S_REDIS_PASS
            valueFrom:
              secretKeyRef:
                name: notification-opaque
                key: REDIS_PASS
          - name: "ConnectionStrings__RabbitMq"
            value: "amqp://$(K8S_RABBITMQ_USER):$(K8S_RABBITMQ_PASSWORD)@$(K8S_RABBITMQ_SERVER):$(K8S_RABBITMQ_PORT)"
          - name: "RabbitMqQueues__NotificationUserCreatedQueue"
            value: "$(K8S_NOTIFICATION_USER_CREATED_QUEUE)"
          - name: "RabbitMqQueues__NotificationPaymentFailedQueue"
            value: "$(K8S_NOTIFICATION_PAYMENT_FAILED_QUEUE)"
          - name: "RabbitMqQueues__NotificationPaymentProcessedQueue"
            value: "$(K8S_NOTIFICATION_PAYMENT_PROCESSED_QUEUE)"
          - name : "RabbitMqQueues__NotificationDeliveryFailedQueue"
            value: "$(K8S_NOTIFICATION_DELIVERY_FAILED_QUEUE)"
          - name: "Redis__Configuration"  
            value: "$(K8S_REDIS_SERVER):$(K8S_REDIS_PORT),password=$(K8S_REDIS_PASS),abortConnect=false"
          - name: "Redis__InstanceName"  
            value: "$(K8S_REDIS_NAME)"
          - name: "ASPNETCORE_ENVIRONMENT"
            value: "$(K8S_ENVIRONMENT)"
        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5